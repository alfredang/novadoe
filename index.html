<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NovaDOE — Design of Experiments Generator</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='6' fill='%234f46e5'/><text x='16' y='22' font-size='18' font-family='sans-serif' font-weight='bold' fill='white' text-anchor='middle'>D</text></svg>">
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<!-- ============================================================
     HEADER
     ============================================================ -->
<header class="app-header">
  <div class="header-inner">
    <div class="header-brand">
      <div class="header-logo">D</div>
      <div>
        <div class="header-title">NovaDOE</div>
        <div class="header-subtitle">Design of Experiments Generator</div>
      </div>
    </div>
    <div class="header-actions">
      <button class="btn btn-secondary btn-sm" id="btnSaveSetup" title="Save setup to browser">💾 Save</button>
      <button class="btn btn-secondary btn-sm" id="btnLoadSetup" title="Load saved setup">📂 Load</button>
      <button class="theme-toggle" id="themeToggle" title="Toggle theme">🌙</button>
    </div>
  </div>
</header>

<!-- ============================================================
     MAIN LAYOUT
     ============================================================ -->
<main class="app-main">
  <!-- LEFT PANEL -->
  <div class="left-panel">

    <!-- DOE Type Selector -->
    <div class="card">
      <div class="card-title"><span class="icon">🔬</span> Design Type</div>
      <div class="doe-type-grid" id="doeTypeGrid"></div>
      <div class="doe-info" id="doeInfo" style="margin-top:0.75rem"></div>
    </div>

    <!-- Factor Builder -->
    <div class="card">
      <div class="card-title">
        <span class="icon">📐</span> Factors
        <span style="margin-left:auto; display:flex; gap:0.3rem;">
          <button class="btn btn-secondary btn-sm" id="btnAddFactor">+ Add Factor</button>
        </span>
      </div>
      <div id="factorList"></div>
      <div class="warning-banner" id="factorWarning">
        <span>⚠️</span>
        <span id="factorWarningText"></span>
      </div>
    </div>

    <!-- Configuration Panel -->
    <div class="card" id="configCard">
      <div class="card-title"><span class="icon">⚙️</span> Configuration</div>
      <div id="configPanel"></div>
    </div>

    <!-- Generate Button -->
    <div style="margin-top:1rem;">
      <button class="btn btn-generate btn-block" id="btnGenerate">Generate Design Matrix</button>
    </div>

    <!-- Reset -->
    <div style="margin-top:0.5rem; text-align:center;">
      <button class="btn btn-danger btn-sm" id="btnReset">Reset All</button>
    </div>

    <!-- Presets -->
    <div class="card">
      <div class="card-title"><span class="icon">📋</span> Preset Examples</div>
      <div class="preset-grid" id="presetGrid"></div>
    </div>
  </div>

  <!-- RIGHT PANEL -->
  <div class="right-panel">

    <!-- Summary Card -->
    <div class="card" id="summaryCard" style="display:none;">
      <div class="card-title"><span class="icon">📊</span> Design Summary</div>
      <div class="summary-grid" id="summaryGrid"></div>
    </div>

    <!-- Results -->
    <div class="card" id="resultsCard">
      <div class="card-title"><span class="icon">📋</span> Design Matrix</div>

      <!-- Export & Table Toolbar -->
      <div class="table-toolbar" id="tableToolbar" style="display:none;">
        <div class="table-search">
          <input type="text" id="tableSearch" placeholder="Search rows...">
        </div>
        <div class="export-bar">
          <button class="btn btn-secondary btn-sm" id="btnExportCSV">📥 CSV</button>
          <button class="btn btn-secondary btn-sm" id="btnExportJSON">📥 JSON</button>
          <button class="btn btn-secondary btn-sm" id="btnCopy">📋 Copy</button>
          <button class="btn btn-secondary btn-sm" id="btnPrint">🖨️ Print</button>
        </div>
      </div>

      <div class="table-container" id="tableContainer" style="display:none;">
        <table class="results-table" id="resultsTable">
          <thead id="resultsHead"></thead>
          <tbody id="resultsBody"></tbody>
        </table>
      </div>

      <div class="pagination" id="pagination" style="display:none;"></div>

      <!-- Empty State -->
      <div class="empty-state" id="emptyState">
        <div class="empty-icon">📐</div>
        <h3>No Design Generated</h3>
        <p>Select a DOE type, configure your factors, and click "Generate Design Matrix" to begin.</p>
      </div>
    </div>
  </div>
</main>

<!-- Footer -->
<footer class="app-footer">
  Powered by <a href="https://www.tertiarycourses.com.sg/" target="_blank" rel="noopener noreferrer">Tertiary Infotech Pte Ltd</a>
</footer>

<!-- Toast Container -->
<div class="toast-container" id="toastContainer"></div>

<script src="js/app.js"></script>
</body>
</html>
